<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ARP Content Manager</title>
  <!-- Responsive logo styling for Decap CMS login page -->
  <style>
    /* Constrain the custom logo to scale responsively */
    img[src*="arp-logo"] {
      max-width: 280px;
      width: 80vw;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    @media (min-width: 480px) {
      img[src*="arp-logo"] {
        max-width: 350px;
      }
    }
    @media (min-width: 768px) {
      img[src*="arp-logo"] {
        max-width: 400px;
      }
    }
    /* Hide the Decap CMS logo at the bottom of the login page */
    [class*="AppHeader"] a[href*="decap"],
    [class*="AppHeader"] a[href*="netlify"],
    a[href="https://decapcms.org"] {
      display: none !important;
    }
    /* Style the custom info text below login button */
    .cms-login-info {
      max-width: 400px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      text-align: center;
      color: #767676;
      font-size: 0.875rem;
      line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .cms-login-info a {
      color: #3182ce;
      text-decoration: none;
    }
    .cms-login-info a:hover {
      text-decoration: underline;
    }
  </style>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <!-- Auto-generate slug from title -->
  <script>
    // Function to convert title to slug
    function generateSlug(title) {
      return title
        .toLowerCase()
        .trim()
        .replace(/[^\w\s-]/g, '') // Remove special characters
        .replace(/\s+/g, '-')     // Replace spaces with hyphens
        .replace(/-+/g, '-')      // Replace multiple hyphens with single
        .replace(/^-+|-+$/g, ''); // Remove leading/trailing hyphens
    }
    
    // Map of title field names to slug field names for each collection
    const titleToSlugMap = {
      'title': 'slug',  // Podcast, Blog, Library
      'name': 'slug'    // Community
    };
    
    // Track if slug has been manually edited
    let slugManuallyEdited = {};
    
    // Setup auto-slug generation
    function setupAutoSlug() {
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === 1) {
              // Find title/name input fields
              const titleInputs = node.querySelectorAll('input[id*="title"], input[id*="name"]');
              titleInputs.forEach(setupTitleListener);
              
              // Find slug input fields and track manual edits
              const slugInputs = node.querySelectorAll('input[id*="slug"]');
              slugInputs.forEach(setupSlugListener);
            }
          });
        });
      });
      
      observer.observe(document.body, { childList: true, subtree: true });
    }
    
    function setupTitleListener(titleInput) {
      if (titleInput.dataset.autoSlugSetup) return;
      titleInput.dataset.autoSlugSetup = 'true';
      
      titleInput.addEventListener('input', (e) => {
        const titleValue = e.target.value;
        const formContainer = e.target.closest('div[class*="ControlContainer"]')?.parentElement?.parentElement;
        
        if (formContainer) {
          // Find the slug input in the same form
          const slugInput = formContainer.querySelector('input[id*="slug"]');
          if (slugInput && !slugManuallyEdited[slugInput.id]) {
            const newSlug = generateSlug(titleValue);
            
            // Set the value and trigger React's change detection
            const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
            nativeInputValueSetter.call(slugInput, newSlug);
            
            const inputEvent = new Event('input', { bubbles: true });
            slugInput.dispatchEvent(inputEvent);
          }
        }
      });
    }
    
    function setupSlugListener(slugInput) {
      if (slugInput.dataset.slugListenerSetup) return;
      slugInput.dataset.slugListenerSetup = 'true';
      
      // Track when user manually types in slug field
      slugInput.addEventListener('keydown', (e) => {
        // If user types in slug field, mark it as manually edited
        if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete') {
          slugManuallyEdited[slugInput.id] = true;
        }
      });
      
      // Reset manual edit flag when entering a new entry
      slugInput.addEventListener('focus', () => {
        if (slugInput.value === '') {
          slugManuallyEdited[slugInput.id] = false;
        }
      });
    }
    
    // Start observing once DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupAutoSlug);
    } else {
      setupAutoSlug();
    }
  </script>
  
  <!-- Customize Decap CMS login page -->
  <script>
    (function() {
      const observer = new MutationObserver(function(mutations) {
        // Change "Login" button text to "CMS Login"
        const buttons = document.querySelectorAll('button');
        buttons.forEach(function(btn) {
          if (btn.textContent.trim() === 'Login') {
            btn.textContent = 'CMS Login';
          }
        });

        // Add info text below the login button if not already added
        if (!document.querySelector('.cms-login-info')) {
          const loginBtn = Array.from(document.querySelectorAll('button')).find(
            function(btn) { return btn.textContent.trim() === 'CMS Login'; }
          );
          if (loginBtn) {
            const container = loginBtn.closest('div') || loginBtn.parentElement;
            if (container) {
              const info = document.createElement('div');
              info.className = 'cms-login-info';
              info.innerHTML = 'This is the content management system for The Autism Resource Project. ' +
                'Access is restricted to authorized agents only. ' +
                'Visit <a href="https://www.practicalai.app">practicalai.app</a> to learn more.';
              container.parentElement.insertBefore(info, container.nextSibling);
            }
          }
        }

        // Hide Decap logo/branding links
        document.querySelectorAll('a').forEach(function(link) {
          if (link.href && (link.href.includes('decapcms.org') || link.href.includes('netlify'))) {
            link.style.display = 'none';
          }
        });
      });

      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>

  <!-- Netlify Identity Redirect Script -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
